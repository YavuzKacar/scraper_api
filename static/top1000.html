<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top 1000 Sites — Scraper API</title>
  <style>
    :root {
      --bg:         #0d1117;
      --surface:    #161b22;
      --surface2:   #21262d;
      --border:     #30363d;
      --text:       #c9d1d9;
      --muted:      #8b949e;
      --accent:     #58a6ff;
      --accent-dim: #1f6feb;
      --ok:         #3fb950;
      --fail:       #f85149;
      --warn:       #d29922;
      --radius:     6px;
      --font:       -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --mono:       ui-monospace, SFMono-Regular, "SF Mono", Consolas, monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; min-height: 100vh; }

    /* ── Header ── */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 8px 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .header h1 { font-size: 14px; font-weight: 700; white-space: nowrap; }
    .hcfg { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; flex: 1; }
    .hlbl { font-size: 11px; color: var(--muted); font-weight: 600; white-space: nowrap; }
    #apiBase { width: 200px; }
    #apiKey  { width: 180px; font-family: var(--mono); }
    .header a { font-size: 12px; color: var(--accent); text-decoration: none; margin-left: 4px; }
    .header a:hover { text-decoration: underline; }

    /* ── Controls ── */
    .controls {
      position: sticky; top: 49px; z-index: 99;
      background: var(--surface2); border-bottom: 1px solid var(--border);
      padding: 8px 16px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    }
    .controls input[type=text], .controls select {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-family: var(--font); font-size: 13px; padding: 5px 9px;
      outline: none; transition: border-color .15s;
    }
    .controls input:focus { border-color: var(--accent); }
    #searchInput { width: 220px; }
    #catFilter   { min-width: 140px; }

    /* ── Stats bar ── */
    .stats {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 6px 16px; display: flex; gap: 20px; align-items: center; font-size: 12px; color: var(--muted);
    }
    .stat-val { font-weight: 700; color: var(--text); }
    .stat-ok  { color: var(--ok); }
    .stat-fail{ color: var(--fail); }
    .stat-run { color: var(--warn); }

    /* ── Queue progress ── */
    .queue-bar {
      height: 2px; background: var(--border); position: relative; overflow: hidden;
    }
    .queue-fill {
      height: 100%; background: var(--accent); transition: width .3s;
      position: absolute; left: 0; top: 0; width: 0%;
    }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead { position: sticky; top: 95px; z-index: 98; }
    th {
      text-align: left; padding: 6px 10px;
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em;
      color: var(--muted); background: var(--surface2); border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    th.sortable { cursor: pointer; user-select: none; }
    th.sortable:hover { color: var(--text); }
    th .sort-arrow { margin-left: 4px; opacity: .4; }
    th.sort-asc .sort-arrow::after  { content: '↑'; opacity: 1; }
    th.sort-desc .sort-arrow::after { content: '↓'; opacity: 1; }
    th .sort-arrow::after { content: '↕'; }
    td { padding: 6px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr.hidden-row { display: none; }
    tr:hover td   { background: rgba(255,255,255,.015); }
    tr.expanded td { background: #0f1419; }

    .rank-cell { color: var(--muted); font-size: 11px; width: 44px; text-align: right; padding-right: 14px; }
    .domain-cell { font-family: var(--mono); font-size: 12px; }
    .domain-cell a { color: var(--accent); text-decoration: none; }
    .domain-cell a:hover { text-decoration: underline; }
    .cat-cell { color: var(--muted); font-size: 11px; white-space: nowrap; }
    .status-cell { width: 90px; }
    .actions-cell { width: 160px; white-space: nowrap; }

    /* ── Detail row ── */
    .detail-row { display: none; }
    .detail-row.open { display: table-row; }
    .detail-td {
      padding: 0 10px 10px 44px;
      border-bottom: 1px solid var(--border);
      background: #0a0e14;
    }
    .detail-inner { padding: 10px 0 2px; }
    .detail-status {
      display: flex; align-items: center; gap: 8px; padding: 7px 10px;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      font-size: 12px; margin-bottom: 8px;
    }
    .detail-meta { display: flex; gap: 12px; flex-wrap: wrap; font-size: 11px; color: var(--muted); margin-bottom: 8px; }
    .detail-meta span b { color: var(--text); }
    .html-pre {
      background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 8px; font-family: var(--mono); font-size: 11px; line-height: 1.5;
      max-height: 220px; overflow-y: auto; white-space: pre-wrap; word-break: break-all;
      color: #7d8590;
    }
    .err-pre {
      color: var(--fail); background: #1a0a0a; border-color: #3d1a1a;
    }
    .detail-actions { display: flex; gap: 6px; margin-top: 8px; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px;
      border-radius: var(--radius); border: 1px solid var(--border); cursor: pointer;
      font-size: 12px; font-family: var(--font); font-weight: 600;
      transition: background .12s, border-color .12s; white-space: nowrap;
    }
    .btn-primary  { background: var(--accent-dim); border-color: var(--accent); color: #fff; }
    .btn-primary:hover  { background: var(--accent); }
    .btn-secondary { background: var(--surface2); color: var(--text); }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn-success  { background: #1a4a28; border-color: #2ea043; color: var(--ok); }
    .btn-success:hover  { background: #196230; }
    .btn-danger   { background: #3d1a1a; border-color: #8c1c1c; color: var(--fail); }
    .btn-danger:hover   { background: #5a2020; }
    .btn-warn     { background: #4a3a10; border-color: #8c6a20; color: var(--warn); }
    .btn-warn:hover     { background: #5a4a18; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-xs { font-size: 11px; padding: 2px 7px; }

    /* ── Badges ── */
    .badge { display: inline-block; padding: 1px 7px; border-radius: 12px; font-size: 10px; font-weight: 700; }
    .badge-idle   { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .badge-run    { background: #4a3a10; color: var(--warn);  border: 1px solid #8c6a20; }
    .badge-ok     { background: #1a4a28; color: var(--ok);   border: 1px solid #2ea043; }
    .badge-fail   { background: #3d1a1a; color: var(--fail); border: 1px solid #8c1c1c; }
    .badge-info   { background: #162032; color: var(--accent); border: 1px solid var(--accent-dim); }

    /* ── Misc ── */
    input[type=text], input[type=password] {
      background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-family: var(--font); font-size: 13px; padding: 5px 9px;
      outline: none; transition: border-color .15s;
    }
    input:focus { border-color: var(--accent); }
    select {
      background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-family: var(--font); font-size: 13px; padding: 5px 9px;
      outline: none;
    }
    .spacer { flex: 1; }
    .text-muted { color: var(--muted); }
    #healthStatus { font-size: 12px; }
    .conc-label { font-size: 11px; color: var(--muted); white-space: nowrap; }
    #concurrency { width: 52px; text-align: center; }
    .empty-state { padding: 40px; text-align: center; color: var(--muted); }
    .sel-chk { accent-color: var(--accent); cursor: pointer; width: 14px; height: 14px; }
  </style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────────────── -->
<div class="header">
  <h1>⚙ Scraper API</h1>
  <div class="hcfg">
    <span class="hlbl">API URL</span>
    <input id="apiBase" type="text" placeholder="http://127.0.0.1:8000" oninput="saveConfig()">
    <span class="hlbl">API Key</span>
    <input id="apiKey" type="password" placeholder="your-api-key" oninput="saveConfig()">
    <button class="btn btn-secondary btn-xs" onclick="checkHealth()">◉ Health</button>
    <span id="healthStatus" class="text-muted"></span>
  </div>
  <a href="/ui/">← Main UI</a>
</div>

<!-- ── Controls ───────────────────────────────────────────────────────────── -->
<div class="controls">
  <input id="searchInput" type="text" placeholder="🔍 Filter domains…" oninput="applyFilter()">
  <select id="catFilter" onchange="applyFilter()">
    <option value="">All categories</option>
  </select>
  <select id="statusFilter" onchange="applyFilter()">
    <option value="">All statuses</option>
    <option value="idle">Idle</option>
    <option value="running">Running</option>
    <option value="ok">Success</option>
    <option value="fail">Failed</option>
  </select>
  <button class="btn btn-secondary btn-xs" onclick="toggleSelectAll()">☑ Select Visible</button>
  <button class="btn btn-success"   id="scrapeSelBtn" onclick="scrapeSelected()">▶ Scrape Selected</button>
  <button class="btn btn-primary"   id="scrapeAllBtn" onclick="scrapeAllVisible()">▶▶ Scrape All Visible</button>
  <button class="btn btn-warn btn-xs" id="pauseBtn" onclick="togglePause()" style="display:none">⏸ Pause</button>
  <button class="btn btn-danger btn-xs" id="cancelBtn" onclick="cancelQueue()" style="display:none">✕ Cancel</button>
  <span class="spacer"></span>
  <span class="conc-label">Concurrency:</span>
  <input id="concurrency" type="number" min="1" max="10" value="1" style="width:52px;text-align:center;">
  <select id="forceStrategy" style="min-width:110px;">
    <option value="">— auto —</option>
    <option value="static">static</option>
    <option value="browser">browser</option>
    <option value="tor">tor</option>
  </select>
</div>

<!-- ── Stats ──────────────────────────────────────────────────────────────── -->
<div class="stats">
  <span>Visible: <span class="stat-val" id="statVisible">1000</span></span>
  <span>Selected: <span class="stat-val" id="statSelected">0</span></span>
  <span>Queued: <span class="stat-val stat-run" id="statQueued">0</span></span>
  <span>Running: <span class="stat-val stat-run" id="statRunning">0</span></span>
  <span>Done: <span class="stat-val stat-ok" id="statDone">0</span></span>
  <span>Failed: <span class="stat-val stat-fail" id="statFailed">0</span></span>
</div>
<div class="queue-bar"><div class="queue-fill" id="queueFill"></div></div>

<!-- ── Table ──────────────────────────────────────────────────────────────── -->
<div class="table-wrap">
  <table id="sitesTable">
    <thead>
      <tr>
        <th style="width:30px;"><input type="checkbox" class="sel-chk" id="masterChk" onclick="masterSelect(this)"></th>
        <th class="sortable sort-desc" data-col="r" onclick="sortBy('r',this)">#<span class="sort-arrow"></span></th>
        <th class="sortable" data-col="d" onclick="sortBy('d',this)">Domain<span class="sort-arrow"></span></th>
        <th class="sortable" data-col="c" onclick="sortBy('c',this)">Category<span class="sort-arrow"></span></th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="noResults" class="empty-state" style="display:none;">No sites match the current filter.</div>
</div>

// Deduplicate (safety net)
(function dedup() {
  const seen = new Set();
  for (let i = SITES.length - 1; i >= 0; i--) {
    if (seen.has(SITES[i].d)) SITES.splice(i, 1);
    else seen.add(SITES[i].d);
  }
}());

// ── Config ────────────────────────────────────────────────────────────────────
function getConfig() {
  return {
    apiBase: (document.getElementById('apiBase').value || '').replace(/\/$/, ''),
    apiKey:  document.getElementById('apiKey').value || '',
  };
}
function saveConfig() {
  const { apiBase, apiKey } = getConfig();
  if (apiBase) localStorage.setItem('sa_apiBase', apiBase);
  if (apiKey)  localStorage.setItem('sa_apiKey', apiKey);
}
function loadConfig() {
  const defBase = window.location.origin !== 'null' ? window.location.origin : 'http://127.0.0.1:8000';
  document.getElementById('apiBase').value = localStorage.getItem('sa_apiBase') || defBase;
  document.getElementById('apiKey').value  = localStorage.getItem('sa_apiKey')  || '';
}

// ── API ───────────────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const { apiBase, apiKey } = getConfig();
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', 'X-API-KEY': apiKey },
  };
  if (body !== undefined) opts.body = JSON.stringify(body);
  let resp;
  try {
    resp = await fetch(apiBase + path, opts);
  } catch (e) {
    throw new Error('Network error: ' + e.message);
  }
  const data = await resp.json().catch(() => ({ detail: resp.statusText }));
  if (!resp.ok) {
    let msg = data.detail;
    if (Array.isArray(msg)) msg = msg.map(e => `${e.loc ? e.loc.slice(1).join('.') + ': ' : ''}${e.msg}`).join('; ');
    else if (typeof msg !== 'string') msg = JSON.stringify(msg);
    throw new Error(msg || `HTTP ${resp.status}`);
  }
  return data;
}

// ── Filter / sort ─────────────────────────────────────────────────────────────
let currentSort = { col: 'r', dir: 'asc' };

function applyFilter() {
  const q   = document.getElementById('searchInput').value.toLowerCase().trim();
  const cat = document.getElementById('catFilter').value.toLowerCase();
  const sts = document.getElementById('statusFilter').value;

  let visible = 0;
  document.querySelectorAll('#tbody tr[id^="row-"]').forEach(tr => {
    const domainMatch = !q   || tr.dataset.domain.includes(q);
    const catMatch    = !cat || tr.dataset.cat === cat;
    const stsMatch    = !sts || tr.dataset.status === sts;
    const show = domainMatch && catMatch && stsMatch;
    tr.classList.toggle('hidden-row', !show);
    // Also hide the matching detail row
    const dr = document.getElementById('detail-' + tr.id.replace('row-', ''));
    if (dr) dr.classList.toggle('hidden-row', !show);
    if (show) visible++;
  });

  document.getElementById('statVisible').textContent = visible;
  document.getElementById('noResults').style.display = visible === 0 ? '' : 'none';
  updateSelCount();
}

function sortBy(col, th) {
  const dir = (currentSort.col === col && currentSort.dir === 'asc') ? 'desc' : 'asc';
  currentSort = { col, dir };

  document.querySelectorAll('th.sortable').forEach(t => t.classList.remove('sort-asc','sort-desc'));
  th.classList.add(dir === 'asc' ? 'sort-asc' : 'sort-desc');

  const tbody = document.getElementById('tbody');
  const rows  = [...tbody.querySelectorAll('tr[id^="row-"]')];
  rows.sort((a, b) => {
    let av = col === 'r' ? Number(a.dataset.rank) : (col === 'd' ? a.dataset.domain : a.dataset.cat);
    let bv = col === 'r' ? Number(b.dataset.rank) : (col === 'd' ? b.dataset.domain : b.dataset.cat);
    if (av < bv) return dir === 'asc' ? -1 : 1;
    if (av > bv) return dir === 'asc' ?  1 : -1;
    return 0;
  });

  rows.forEach(r => {
    const domain = r.id.replace('row-', '');
    const dr = document.getElementById('detail-' + domain);
    tbody.appendChild(r);
    if (dr) tbody.appendChild(dr);
  });
}

// ── Scrape a single site ──────────────────────────────────────────────────────
async function scrapeSingle(domain, url, isQueued = false) {
  setStatus(domain, 'running');
  try {
    const strategy = document.getElementById('forceStrategy').value || undefined;
    const body = { url };
    if (strategy) body.force_strategy = strategy;
    const result = await api('POST', '/scrape', body);
    state[domain] = { status: 'ok', result };
    setStatus(domain, 'ok');
    renderDetail(domain, result, null);
  } catch (e) {
    state[domain] = { status: 'fail', error: e.message };
    setStatus(domain, 'fail');
    renderDetail(domain, null, e.message);
  } finally {
    if (!isQueued) updateStats();
  }
}

async function statusSingle(domain, url) {
  setStatus(domain, 'running');
  try {
    const result = await api('GET', '/status/' + encodeURIComponent(url));
    state[domain] = { status: 'ok', result };
    setStatus(domain, 'ok');
    renderStatusDetail(domain, result);
  } catch (e) {
    state[domain] = { status: 'fail', error: e.message };
    setStatus(domain, 'fail');
    renderDetail(domain, null, e.message);
  } finally {
    updateStats();
  }
}

// ── Queue ─────────────────────────────────────────────────────────────────────
function scrapeAllVisible() {
  const domains = getVisibleDomains();
  if (!domains.length) return;
  startQueue(domains);
}

function scrapeSelected() {
  const domains = getSelectedDomains();
  if (!domains.length) { alert('Check some rows first.'); return; }
  startQueue(domains);
}

function getVisibleDomains() {
  return [...document.querySelectorAll('#tbody tr[id^="row-"]:not(.hidden-row)')]
    .map(tr => ({ domain: tr.id.replace('row-', ''), url: 'https://' + tr.id.replace('row-', '') }));
}

function getSelectedDomains() {
  return [...document.querySelectorAll('.row-chk:checked')]
    .map(chk => ({ domain: chk.dataset.domain, url: 'https://' + chk.dataset.domain }));
}

function startQueue(items) {
  queue      = [...items];
  paused     = false;
  cancelled  = false;
  queueTotal = items.length;
  queueDone  = 0;

  document.getElementById('pauseBtn').style.display  = '';
  document.getElementById('cancelBtn').style.display = '';
  document.getElementById('scrapeAllBtn').disabled   = true;
  document.getElementById('scrapeSelBtn').disabled   = true;

  const conc = Math.max(1, Math.min(10, parseInt(document.getElementById('concurrency').value, 10) || 1));
  for (let i = 0; i < conc; i++) runNext();
}

async function runNext() {
  if (cancelled || paused || queue.length === 0) {
    running = Math.max(0, running - 1);
    if (running === 0 && (cancelled || queue.length === 0)) finaliseQueue();
    updateStats();
    return;
  }
  const item = queue.shift();
  running++;
  updateStats();
  await scrapeSingle(item.domain, item.url, true);
  queueDone++;
  running--;
  updateQueueProgress();
  updateStats();
  runNext();
}

function updateQueueProgress() {
  const pct = queueTotal > 0 ? (queueDone / queueTotal * 100) : 0;
  document.getElementById('queueFill').style.width = pct + '%';
}

function finaliseQueue() {
  document.getElementById('pauseBtn').style.display  = 'none';
  document.getElementById('cancelBtn').style.display = 'none';
  document.getElementById('scrapeAllBtn').disabled   = false;
  document.getElementById('scrapeSelBtn').disabled   = false;
  document.getElementById('queueFill').style.width   = '0%';
  queue = [];
}

function togglePause() {
  paused = !paused;
  const btn = document.getElementById('pauseBtn');
  btn.textContent = paused ? '▶ Resume' : '⏸ Pause';
  if (!paused) {
    const conc = Math.max(1, Math.min(10, parseInt(document.getElementById('concurrency').value, 10) || 1));
    for (let i = 0; i < conc; i++) runNext();
  }
}

function cancelQueue() {
  cancelled = true;
  queue = [];
  finaliseQueue();
}

// ── Detail rendering ──────────────────────────────────────────────────────────
function renderDetail(domain, result, errMsg) {
  const container = document.getElementById('detail-inner-' + domain);
  if (!container) return;

  if (errMsg) {
    container.innerHTML = `<div class="detail-status">
      <span class="badge badge-fail">✗ Error</span>
      <span style="color:var(--fail)">${esc(errMsg)}</span>
    </div>`;
  } else {
    const ok = result.scraping_success;
    const stratText = result.strategy_used ? `strategy: <b>${esc(result.strategy_used)}</b>` : '';
    const kb = result.html ? (result.html.length / 1024).toFixed(1) + ' KB' : '—';
    const preview = result.html
      ? esc(result.html.slice(0, 4000)) + (result.html.length > 4000 ? '\n…(truncated)' : '')
      : '';

    container.innerHTML = `
      <div class="detail-status">
        <span class="badge ${ok ? 'badge-ok' : 'badge-fail'}">${ok ? '✓ Success' : '✗ Failed'}</span>
        <span class="text-muted">${esc(result.message || '')}</span>
        ${stratText ? `<span class="text-muted">&middot; ${stratText}</span>` : ''}
      </div>
      <div class="detail-meta">
        ${result.html ? `<span>Size: <b>${esc(kb)}</b></span>` : ''}
        ${result.credits_remaining !== undefined ? `<span>Credits left: <b>${esc(String(result.credits_remaining))}</b></span>` : ''}
        ${result.scrape_time_ms    !== undefined ? `<span>Time: <b>${esc(String(result.scrape_time_ms))}ms</b></span>` : ''}
      </div>
      ${preview ? `<div class="html-pre">${preview}</div>` : ''}
      <div class="detail-actions">
        ${result.html ? `<button class="btn btn-secondary btn-xs" onclick="copyHtml('${esc(domain)}')">⧉ Copy HTML</button>` : ''}
        <button class="btn btn-secondary btn-xs" onclick="copyJson('${esc(domain)}')">{ } Copy JSON</button>
      </div>`;
  }

  openDetail(domain);
}

function renderStatusDetail(domain, result) {
  const container = document.getElementById('detail-inner-' + domain);
  if (!container) return;
  if (!result.found) {
    container.innerHTML = `<div class="detail-status"><span class="badge badge-idle">Not found</span><span class="text-muted">No stored record for this URL.</span></div>`;
  } else {
    const rec = result.record;
    let rows = '';
    for (const [k, v] of Object.entries(rec)) {
      if (v === null || v === undefined || k === 'url' || k === 'last_success_html') continue;
      rows += `<span>${esc(k.replace(/_/g,' '))}: <b>${esc(String(v))}</b></span>`;
    }
    container.innerHTML = `<div class="detail-status"><span class="badge badge-info">Record</span></div><div class="detail-meta">${rows}</div>`;
  }
  openDetail(domain);
}

function openDetail(domain) {
  const dr  = document.getElementById('detail-' + domain);
  const btn = document.getElementById('expand-' + domain);
  if (dr) { dr.classList.add('open'); dr.classList.remove('hidden-row'); }
  if (btn) { btn.style.display = ''; btn.textContent = '⌃'; }
}

function toggleDetail(domain) {
  const dr  = document.getElementById('detail-' + domain);
  const btn = document.getElementById('expand-' + domain);
  if (!dr) return;
  const isOpen = dr.classList.contains('open');
  dr.classList.toggle('open', !isOpen);
  if (btn) btn.textContent = isOpen ? '⌄' : '⌃';
}

// ── Status badge ──────────────────────────────────────────────────────────────
function setStatus(domain, sts) {
  const el = document.getElementById('st-' + domain);
  const tr = document.getElementById('row-' + domain);
  if (!el) return;
  const map = {
    idle:    ['badge-idle',  'idle'],
    running: ['badge-run',   '⏳ running'],
    ok:      ['badge-ok',    '✓ ok'],
    fail:    ['badge-fail',  '✗ failed'],
  };
  const [cls, label] = map[sts] || map.idle;
  el.innerHTML = `<span class="badge ${cls}">${label}</span>`;
  if (tr) tr.dataset.status = sts;
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function updateStats() {
  const statuses = Object.values(state).map(s => s.status);
  document.getElementById('statRunning').textContent = running;
  document.getElementById('statQueued').textContent  = queue.length;
  document.getElementById('statDone').textContent    = statuses.filter(s => s === 'ok').length;
  document.getElementById('statFailed').textContent  = statuses.filter(s => s === 'fail').length;
  updateSelCount();
}

function updateSelCount() {
  const checked = document.querySelectorAll('.row-chk:checked').length;
  document.getElementById('statSelected').textContent = checked;
}

  updateSelCount();
}

// ── Copy helpers ──────────────────────────────────────────────────────────────
function copyHtml(domain) {
  const s = state[domain];
  if (s && s.result && s.result.html) {
    navigator.clipboard.writeText(s.result.html).catch(() => {});
  }
}
function copyJson(domain) {
  const s = state[domain];
  if (s && s.result) {
    navigator.clipboard.writeText(JSON.stringify(s.result, null, 2)).catch(() => {});
  }
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ──────────────────────────────────────────────────────────────────────
(function init() {
  loadConfig();
  buildTable();
  applyFilter();
}());
</script>
